name: Pin SHA in claude-plugins

permissions:
  contents: read

on:
  push:
    branches: [master]
    # Allowlist: only functional plugin content re-pins the marketplace SHA.
    # NOTE: a `paths-ignore: ['**.md']` denylist would be WRONG here — skills are
    # SKILL.md files, so it would suppress re-pinning on skill content changes.
    # After the v2 split, all functional content lives under plugins/<name>/.
    paths:
      - 'plugins/odoo-ai-agents/**'
      - 'plugins/odoo-semantic-mcp/**'

# Cancel in-flight pin run when a newer qualifying commit lands.
concurrency:
  group: pin-sha-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  pin-sha:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get SHA
        id: info
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check kill-switch (BLOCKED_VERSIONS.md)
        id: killswitch
        run: |
          SHA7="${{ steps.info.outputs.sha }}"
          SHA7="${SHA7:0:7}"
          # Extract 7-char SHAs from the SHA column of the blocked table.
          # Table rows look like: | v0.x.y | abc1234 | reason | workaround |
          BLOCKED=$(grep -E '^\|[[:space:]]*v[0-9]' BLOCKED_VERSIONS.md \
            | awk -F'|' '{gsub(/[[:space:]]/,"",$3); print $3}' || true)
          if echo "$BLOCKED" | grep -qx "$SHA7"; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
            echo "⛔ HEAD ${SHA7} is in BLOCKED_VERSIONS.md — skipping marketplace pin."
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
            echo "✓ HEAD ${SHA7} is not blocked — proceeding with pin."
          fi

      - uses: actions/checkout@v6
        if: steps.killswitch.outputs.blocked == 'false'
        with:
          repository: Viindoo/claude-plugins
          token: ${{ secrets.CLAUDE_PLUGINS_PAT }}
          path: claude-plugins

      - name: Check if already pinned
        id: check
        if: steps.killswitch.outputs.blocked == 'false'
        env:
          HEAD_SHA: ${{ steps.info.outputs.sha }}
        run: |
          # Both split plugins must already be at HEAD for us to skip.
          ALL_PINNED=$(python3 -c "
          import json, os
          head = os.environ['HEAD_SHA']
          names = {'odoo-ai-agents', 'odoo-semantic-mcp'}
          m = json.load(open('claude-plugins/.claude-plugin/marketplace.json'))
          seen = {p['name']: p['source'].get('sha', '') for p in m['plugins'] if p['name'] in names}
          ok = names.issubset(seen) and all(seen[n] == head for n in names)
          print('true' if ok else 'false')
          ")
          [ "$ALL_PINNED" = "true" ] && echo "skip=true" >> "$GITHUB_OUTPUT" || echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Update marketplace.json
        if: steps.killswitch.outputs.blocked == 'false' && steps.check.outputs.skip == 'false'
        env:
          HEAD_SHA: ${{ steps.info.outputs.sha }}
        run: |
          # Pin BOTH split plugins (odoo-ai-agents + odoo-semantic-mcp) to the same HEAD SHA.
          python3 -c "
          import json, os
          head = os.environ['HEAD_SHA']
          names = {'odoo-ai-agents', 'odoo-semantic-mcp'}
          path = 'claude-plugins/.claude-plugin/marketplace.json'
          with open(path) as f: m = json.load(f)
          for p in m['plugins']:
              if p['name'] in names:
                  p['source']['sha'] = head
          with open(path, 'w') as f: json.dump(m, f, indent=2); f.write('\n')
          "

      - name: Create PR with auto-merge
        if: steps.killswitch.outputs.blocked == 'false' && steps.check.outputs.skip == 'false'
        working-directory: claude-plugins
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_PLUGINS_PAT }}
        run: |
          SHA="${{ steps.info.outputs.sha }}"
          SHA7="${SHA:0:7}"
          BRANCH="auto-pin/odoo-semantic-plugins-${SHA7}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .claude-plugin/marketplace.json
          git commit -m "pin odoo-semantic plugins to ${SHA7}"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --repo Viindoo/claude-plugins \
            --title "pin odoo-semantic plugins to ${SHA7}" \
            --body "Auto-pin: plugin content changed in [${SHA7}](https://github.com/Viindoo/odoo-mcp-client/commit/${SHA}). Pins both odoo-ai-agents and odoo-semantic-mcp." \
            --label "auto-pin")
          gh pr merge --auto --squash "$PR_URL"

      - name: Notify on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "No SLACK_WEBHOOK_URL configured — skipping alert."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rotating_light: pin-sha failed for odoo-mcp-client @ ${{ steps.info.outputs.sha }}\n${RUN_URL}\"}" \
            "$SLACK_WEBHOOK_URL"
