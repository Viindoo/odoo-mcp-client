name: Confidentiality Scan

on:
  push:
    branches: [master, "refine/**"]
  pull_request:
    branches: [master]

jobs:
  scan:
    name: Vault + personal path scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vault path scan (hard fail)
        run: |
          if grep -rE '/home/tuan/git/obsidian-vault' --include='*.md' --include='*.json' --include='*.py' --include='*.yaml' --include='*.yml' . ; then
            echo "::error::Vault path /home/tuan/git/obsidian-vault found in committed files"
            exit 1
          fi
          echo "OK: no vault path leaks"

      - name: Personal /home/tuan/. path scan (hard fail, allow plan file regex section)
        run: |
          OFFENDERS=$(grep -rlE '/home/tuan/\.' --include='*.md' --include='*.json' --include='*.py' --include='*.yaml' --include='*.yml' . | grep -v 'docs/refinement-plan-2026-05-28.md' || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::/home/tuan/. paths found in:"
            echo "$OFFENDERS"
            exit 1
          fi
          echo "OK: no personal path leaks"

      - name: Personal email scan (hard fail)
        run: |
          if grep -rE 'davidtran\.hp@gmail\.com' --include='*.md' --include='*.json' --include='*.py' --include='*.yaml' --include='*.yml' . ; then
            echo "::error::Personal email leaked"
            exit 1
          fi
          echo "OK: no personal email"

      - name: Sensitive number warning (informational)
        run: |
          if grep -rlE '(\$[0-9]{4,}|[0-9]{1,3}([,.][0-9]{3}){2,}\s*(VND|USD)|OKR.*[0-9]{2}%)' --include='*.md' . ; then
            echo "::warning::possible sensitive number — review"
          fi
