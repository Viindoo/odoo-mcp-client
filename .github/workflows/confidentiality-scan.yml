name: Confidentiality Scan

# Guards against committing personal/confidential data to this public repo.
#
# Design notes:
#   * Carries NO sensitive literal. Generic structural regexes name nothing;
#     project-confidential exact terms come from the CONFIDENTIAL_PATTERNS
#     repository secret (one ERE per line).
#   * Scans EVERY tracked file with no self-exclusion. (A previous version
#     hard-coded the confidential terms here and grep-excluded this very file,
#     so the guard leaked the terms it was guarding. Both are fixed: nothing
#     sensitive lives in-tree, and nothing is excluded from the scan.)

on:
  push:
    branches: [master, "refine/**"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  scan:
    name: Confidentiality scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Structural scan (hard fail)
        run: |
          set -uo pipefail
          # Placeholder usernames that are legitimate documentation, not real paths.
          ALLOW_USER='(user|username|youruser|USER|me|example)'
          fail=0

          # Personal gmail address (public repo should use a noreply/company address).
          hits=$(git grep -lIE '[A-Za-z0-9._%+-]+@gmail\.com' -- . || true)
          if [ -n "$hits" ]; then
            echo "::error::personal gmail address found in:"; echo "$hits"; fail=1
          fi

          # Absolute /home/<user>/ or /Users/<user>/ path, excluding placeholders.
          hits=$(git grep -nIE '/(home|Users)/[A-Za-z0-9._-]+/' -- . \
                 | grep -vE "/(home|Users)/${ALLOW_USER}/" || true)
          if [ -n "$hits" ]; then
            echo "::error::absolute /home|/Users/<user>/ path (non-portable) found in:"; echo "$hits"; fail=1
          fi

          [ "$fail" -eq 0 ] || exit 1
          echo "OK: structural scan clean"

      - name: Confidential-term scan (hard fail)
        env:
          PATTERNS: ${{ secrets.CONFIDENTIAL_PATTERNS }}
        run: |
          set -uo pipefail
          if [ -z "${PATTERNS:-}" ]; then
            echo "::warning::CONFIDENTIAL_PATTERNS secret not set — skipping confidential-term scan"
            exit 0
          fi
          fail=0
          while IFS= read -r pat; do
            case "$pat" in ''|\#*) continue ;; esac
            hits=$(git grep -lIE "$pat" -- . || true)
            if [ -n "$hits" ]; then
              echo "::error::confidential term matched (pattern redacted) in:"; echo "$hits"; fail=1
            fi
          done <<< "$PATTERNS"
          [ "$fail" -eq 0 ] || exit 1
          echo "OK: confidential-term scan clean"

      - name: Sensitive number warning (informational)
        run: |
          if git grep -lIE '(\$[0-9]{4,}|[0-9]{1,3}([,.][0-9]{3}){2,}[[:space:]]*(VND|USD)|OKR.*[0-9]{2}%)' -- '*.md'; then
            echo "::warning::possible sensitive number — review"
          fi
