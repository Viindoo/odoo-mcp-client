name: Confidentiality Scan

on:
  push:
    branches: [master, "refine/**"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  scan:
    name: Vault + personal path scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Vault path scan (hard fail)
        run: |
          OFFENDERS=$(grep -rlE '/home/tuan/git/obsidian-vault' --include='*.md' --include='*.json' --include='*.py' --include='*.yaml' --include='*.yml' . | grep -v '.github/workflows/confidentiality-scan.yml' || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Vault path /home/tuan/git/obsidian-vault found in committed files"
            echo "$OFFENDERS"
            exit 1
          fi
          echo "OK: no vault path leaks"

      - name: Personal /home/tuan/. path scan (hard fail)
        run: |
          OFFENDERS=$(grep -rlE '/home/tuan/\.' --include='*.md' --include='*.json' --include='*.py' --include='*.yaml' --include='*.yml' . | grep -v '.github/workflows/confidentiality-scan.yml' || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::/home/tuan/. paths found in:"
            echo "$OFFENDERS"
            exit 1
          fi
          echo "OK: no personal path leaks"

      - name: Personal email scan (hard fail)
        run: |
          OFFENDERS=$(grep -rlE 'davidtran\.hp@gmail\.com' --include='*.md' --include='*.json' --include='*.py' --include='*.yaml' --include='*.yml' . | grep -v '.github/workflows/confidentiality-scan.yml' || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Personal email leaked"
            echo "$OFFENDERS"
            exit 1
          fi
          echo "OK: no personal email"

      - name: Vietnam regulation scan (hard fail)
        run: |
          OFFENDERS=$(grep -rlEi 'BVDLCN' --include='*.md' --include='*.json' --include='*.py' --include='*.yaml' --include='*.yml' . | grep -v '.github/workflows/confidentiality-scan.yml' || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Vietnam regulation reference (BVDLCN) found in:"
            echo "$OFFENDERS"
            exit 1
          fi
          echo "OK: no BVDLCN leaks"

      - name: Vietnam competitor scan - MISA (hard fail)
        run: |
          OFFENDERS=$(grep -rlEi '\bMISA\b' --include='*.md' --include='*.json' --include='*.py' --include='*.yaml' --include='*.yml' . | grep -v '.github/workflows/confidentiality-scan.yml' || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Vietnam competitor reference (MISA) found in:"
            echo "$OFFENDERS"
            exit 1
          fi
          echo "OK: no MISA leaks"

      - name: Vietnam competitor scan - 1Office/Portcities (hard fail)
        run: |
          OFFENDERS=$(grep -rlEi '(1Office|Portcities)' --include='*.md' --include='*.json' --include='*.py' --include='*.yaml' --include='*.yml' . | grep -v '.github/workflows/confidentiality-scan.yml' || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Vietnam competitor reference (1Office/Portcities) found in:"
            echo "$OFFENDERS"
            exit 1
          fi
          echo "OK: no 1Office/Portcities leaks"

      - name: Vietnam SME framing scan (hard fail)
        run: |
          OFFENDERS=$(grep -rlE 'một-người-công-ty' --include='*.md' --include='*.json' --include='*.py' --include='*.yaml' --include='*.yml' . | grep -v '.github/workflows/confidentiality-scan.yml' || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Vietnam SME framing reference found in:"
            echo "$OFFENDERS"
            exit 1
          fi
          echo "OK: no SME framing leaks"

      - name: Sensitive number warning (informational)
        run: |
          if grep -rlE '(\$[0-9]{4,}|[0-9]{1,3}([,.][0-9]{3}){2,}\s*(VND|USD)|OKR.*[0-9]{2}%)' --include='*.md' . ; then
            echo "::warning::possible sensitive number — review"
          fi
