name: validate

permissions:
  contents: read

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  schema:
    name: plugin schema + skill format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -q

  deps-check:
    name: Skill ↔ Tool dependency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python3 plugins/odoo-semantic-skills/generator/check_deps.py

  gen-check:
    name: Generated artifacts in sync with SSOT
    runs-on: ubuntu-latest
    # Catch generated artifacts (routing matrix, skill ## MCP tools sections,
    # IDE snippets) drifting from server-surface.json. Runs on PRs so drift
    # surfaces before merge.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python3 plugins/odoo-semantic-skills/generator/gen_surface.py check

  e2e-install:
    name: e2e install (${{ matrix.os }})
    # Network + global npm install + live marketplace state — keep it off every PR
    # to avoid flaky external-dependency failures; run on master + manual dispatch.
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: bash tests/test_install_e2e.sh
