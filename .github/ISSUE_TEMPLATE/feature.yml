name: Feature request
description: Suggest an improvement to the plugin, skills, agents, or snippets.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!
        **Client-side only** — new skills, snippet formats, connect-command improvements, agent changes.
        Server-side feature requests go to [the Odoo Semantic service](https://odoo-semantic.viindoo.com/).

  - type: textarea
    id: feature-description
    attributes:
      label: Feature description
      description: What would you like to see added or changed?
      placeholder: "e.g. A new skill that summarises the risk of upgrading a specific module ..."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? Who benefits from it?
      placeholder: "e.g. I need to quickly communicate upgrade risk to a non-technical stakeholder ..."
    validations:
      required: true

  - type: dropdown
    id: persona
    attributes:
      label: Relevant persona / tool
      description: Which persona or MCP tool is most related to this request?
      multiple: true
      options:
        - CEO / Management
        - Developer
        - Consultant
        - Marketer
        - Sales
        - General / cross-persona
        - New snippet / IDE integration
        - Connect command
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried working around this another way?
