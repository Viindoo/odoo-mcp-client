# discovery-pipeline.workflow.yaml
# Reference workflow proving the composition contract runs end-to-end.
# Uses two existing leaf skills (odoo-discovery-summarize -> odoo-gap-analysis)
# in a simple Pipeline pattern, followed by an inline synthesis phase.
name: discovery-pipeline
domain: presales
team_pattern: Pipeline
description: |
  Run a two-phase presales discovery pipeline: summarize raw discovery meeting notes
  into a structured customer profile, then generate a full gap analysis effort matrix
  (Standard/Config/Extension/Custom + day estimates) from that profile - all in one
  gated workflow. Trigger: "discovery to gap analysis", "full presales pipeline",
  "summarize my notes and scope the project", "discovery and scoping in one pass",
  "take my meeting notes and give me a proposal-ready effort matrix"
output_dir: .odoo-ai/discovery
inputs:
  - discovery_notes

phases:
  - id: summarize
    skill: odoo-discovery-summarize
    nl_trigger: >
      Summarize the following raw discovery notes into a structured customer profile
      covering industry vertical, headcount band, current system, pain points with
      verbatim quotes, success criteria, decision process, budget signal, timeline
      urgency, fit assessment (Standard/Config/Custom/Cannot per pain), and open
      questions for the next call.
    model_tier: sonnet
    gate: "approve / refine: [feedback] / cancel"

  - id: gap-analysis
    skill: odoo-gap-analysis
    nl_trigger: >
      Using the customer profile produced in the summarize phase, generate a full gap
      analysis effort matrix. Classify each pain point as Standard / Configuration /
      Extension / Custom with S/M/L/XL day estimates. Include an effort summary,
      total effort band, risk flags, and recommended phasing. The output must be
      ready to paste into a proposal.
    model_tier: sonnet
    gate: "approve / iterate / cancel"

  - id: synthesize
    inline: true
    model_tier: inherit
    gate: "save / discard / cancel"

resume: true
fallback: standalone
