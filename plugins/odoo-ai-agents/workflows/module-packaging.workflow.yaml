# module-packaging.workflow.yaml
# Declarative SSOT for the end-to-end, dependency-aware module packaging pipeline.
# Runner: skills/workflow-chaining - auto-discovered at runtime.
# Phase 0 scope + Phase 0.5 doc-plan are browser-free planning (ONE whole-plan gate).
# Content phases 1-4 (feature-map / walkthrough / icon / copy) fan out per module (Mode B)
#   but process ONLY doc:true modules (dedup skips modules installed only as a dependency).
# Phase 5 provision-capture is the ONLY browser-bound + instance-touching phase - it delegates
#   to skill odoo-doc-illustration (the branch-aware per-instance incremental loop SSOT):
#   SEQUENTIAL within a dependency-path, PARALLEL across independent instance-paths up to W.
#   Browser families are exclusive-serial per family.
name: module-packaging
domain: content
team_pattern: Pipeline
description: |
  End-to-end, dependency-aware module packaging: scope modules + languages, then plan the doc
  package by dependency SHAPE (partition into clusters, allocate instances branch-aware - a
  linear chain shares one incremental instance, each independent branch gets its own pure
  instance, a convergence node reuses a branch instance + installs the fill - order installs
  leaf-dependency-first, and dedup modules already doc'd on disk or on another instance). Then
  build a feature catalog, author usage walkthroughs, design the module icon, draft per-locale
  marketing copy (all for doc:true modules only), provision instances per the plan and run a
  per-instance incremental install -> capture -> verify -> commit loop that documents each module
  on a DB holding ONLY that module plus its deps (no reverse-dependent - pure, extension-free
  screenshots), then audit App-Store manifest keys and aggregate a run index. The whole plan is
  approved at a SINGLE gate before any instance is provisioned; content phases fan out per module;
  the provision-capture phase is browser-bound, serial within a dependency-path and parallel
  across independent paths. Trigger: "package module for the Apps Store", "module documentation
  end-to-end", "viết tài liệu module đầy đủ", "tạo landing page module", "icon + landing + user
  guide for module", "full doc pipeline", "đóng gói module Odoo", "dependency-aware module doc
  package", "doc pipeline for a module cluster", "module packaging workflow"
output_dir: .odoo-ai/packaging
inputs:
  - modules

resume: true
fallback: standalone

phases:
  # ------------------------------------------------------------------
  # Phase 0 - Scope: resolve modules, languages, doc_layer, dependency edges (inline)
  # Browser-free. FIRST phase - everything else depends on this output.
  # ------------------------------------------------------------------
  - id: scope
    inline: true
    model_tier: inherit
    # Establish <run> = doc-run-<timestamp>: the per-run directory under .odoo-ai/packaging/.
    # ALL artifacts for this run live under .odoo-ai/packaging/<run>/; every PER-MODULE artifact
    # lives under .odoo-ai/packaging/<run>/<module>/ (per-module subdir avoids flat-path collision
    # when the run covers more than one module).
    # Resolve target modules from the `modules` input (module name or absolute path; walk
    # __manifest__.py files for multi-module repos). Resolve per-module languages, doc_layer,
    # version, and has_demo by APPLYING the resolver contract defined in agent `odoo-doc-scoper`
    # - that agent's I/O contract is the SSOT for the D6 6-tier + disk-union language resolver,
    # doc_layer (appstore | userguide | both) detection, version inference, the has_demo flag,
    # AND the two dependency-planning fields below. Do NOT reimplement those tiers here; this
    # inline phase only adapts the scoper's output location to the packaging run dir.
    # force-include en_US (English is the canonical mandatory language, always added regardless
    # of registry).
    # Two fields the doc-plan phase (0.5) consumes:
    #   - depends_in_scope[]: per module, the subset of __manifest__['depends'] that is ALSO in
    #     modules[] (the in-scope dependency edges). Empty = no in-scope dependency.
    #   - has_ondisk_doc: true if <module>/static/description/index.html OR <module>/doc/index.rst
    #     already exists (feeds cross-run dedup in the planner).
    # Collect interactively if not passed: `doc_layer` (default: both), `languages`
    # (default: per the odoo-doc-scoper resolver; English always added).
    # Emits scope block: modules[] with {name, path, languages, doc_layer, has_demo, version,
    # depends_in_scope, has_ondisk_doc}.
    # Written to .odoo-ai/packaging/<run>/scope.yaml for all downstream phases.

  # ------------------------------------------------------------------
  # Phase 0.5 - Doc plan: dependency-aware, branch-aware schedule (inline) + SINGLE plan gate
  # Browser-free. Reuses the `odoo-doc-planner` I/O contract inline (parity with how phase 0
  # reuses the doc-scoper contract) and the algorithm SSOT skills/_shared/doc-cluster-plan.md.
  # ------------------------------------------------------------------
  - id: doc-plan
    inline: true
    model_tier: sonnet
    gate: "approve / refine: [feedback] / cancel"
    # Produce the doc-package plan by APPLYING the `odoo-doc-planner` contract with
    # plan_source: scope (doc-only standalone path). Read the scope block at
    # .odoo-ai/packaging/<run>/scope.yaml - modules[] with depends_in_scope[] and has_ondisk_doc.
    # Build the in-scope sub-graph and compute, per skills/_shared/doc-cluster-plan.md (the SSOT
    # algorithm - do NOT restate it here):
    #   - CLUSTERS: connected components of the in-scope sub-graph.
    #   - Leaf-dependency-first topological order within each cluster.
    #   - BRANCH-AWARE instance allocation (default purity: strict-branch):
    #       (a) linear chain  -> ONE persistent instance, installed incrementally leaf-first;
    #       (b) independent branches -> a SEPARATE pure instance each (no sibling menus leak);
    #       (c) convergence node -> REUSE one branch instance + install only the still-missing
    #           FILL (other branches + the node), then doc the node on the complete DB.
    #   - DEDUP (doc_owner map, doc:true|false): a module is doc'd exactly once globally; shared
    #     deps, convergence-fill modules already doc'd, and has_ondisk_doc modules become
    #     doc:false (install-only) with a dedup_reason - unless REDOC: true is passed.
    #   - install_doc_sequence[] per instance (module, doc, install_step, install_delta,
    #     depends_in_scope, extends_in_scope) + convergence[] for branching clusters.
    #   - Inter-instance parallelism W = min(#independent instance-paths, browser-family pool,
    #     ephemeral instance cap) with within_path: sequential; a batch schedule[].
    #   - Per-step provision flags (skip-auto-install / with-demo / load-language=<csv>), exact
    #     spelling resolved via OSM cli_help at runtime.
    # Optional brief overrides consumed if present: REDOC (cross-run re-doc), MAX_CLUSTER_MODULES
    # (split threshold, default ~6), purity (strict-branch | fresh-per-module).
    # OSM-verify the disk edges opportunistically (trust-but-verify) with the CONCRETE version.
    # Write ONE doc-plan.yaml conforming to the doc-cluster-plan.md schema to
    # .odoo-ai/packaging/<run>/doc-plan.yaml (header: plan_kind: doc-package, plan_source: scope,
    # grounding: osm|local-source, scope_ref). Standalone-first: the whole algorithm is
    # disk-resolvable - no instance and no browser needed to plan.
    # GATE: present the WHOLE plan - all clusters + branch-aware instance allocation + install/doc
    # order + dedup (doc:true/false) + the parallelism schedule (W) - for ONE approval
    # (approve / refine: [feedback] / cancel). This is the SINGLE plan gate - NOT a gate per
    # cluster: the purity/dedup/allocation trade-offs are only legible as a whole picture.
    # `refine` re-runs the plan with the feedback; `cancel` aborts BEFORE any instance is
    # provisioned.

  # ------------------------------------------------------------------
  # Phase 1 - Feature catalog (browser-free, fan-out per doc:true module - Mode B)
  # ------------------------------------------------------------------
  - id: feature-map
    skill: odoo-doc-feature-map
    nl_trigger: >
      Process ONLY modules with doc:true in .odoo-ai/packaging/<run>/doc-plan.yaml (skip
      doc:false dedup modules - do NOT catalog a module installed only as a dependency).
      Using the scope block at .odoo-ai/packaging/<run>/scope.yaml, enumerate every feature,
      screen, and capability each in-scope module ships - OSM-first (describe_module, module_inspect,
      model_inspect, check_module_exists; disk fallback for ACL from
      security/ir.model.access.csv and security/*.xml). Per module produce two files under
      .odoo-ai/packaging/<run>/<module>/: feature-catalog.jsonl (machine SSOT: feature_id, name,
      menu_path, entry_point, models, key_fields, roles, states, depends_on, value, grounded) and
      feature-catalog.md (human report). The feature catalog is the shared SSOT for the landing
      Key-Features grid and the guide Usage sections consumed in later phases. Standalone-first; no
      browser or live instance required. Fan out one worker per doc:true module (Mode B); each worker
      writes to its own .odoo-ai/packaging/<run>/<module>/ subdir before gate.
    model_tier: sonnet
    fanout: true
    chunk_by: modules
    gate: "approve / refine: [feedback] / cancel"

  # ------------------------------------------------------------------
  # Phase 2 - Usage walkthroughs (browser-free, fan-out per doc:true module - Mode B)
  # Requires: feature-catalog.jsonl from P1.
  # ------------------------------------------------------------------
  - id: walkthrough
    skill: odoo-doc-walkthrough
    nl_trigger: >
      Process ONLY modules with doc:true in .odoo-ai/packaging/<run>/doc-plan.yaml (skip
      doc:false dedup modules). Using the feature catalog at
      .odoo-ai/packaging/<run>/<module>/feature-catalog.jsonl and the scope block at
      .odoo-ai/packaging/<run>/scope.yaml, author happy-path usage scenarios for each in-scope
      module: narrative + structured steps[] (action, target, value, note per step) grounded
      in the module's actual behavior from source. Per module, produce walkthrough.jsonl (machine
      SSOT with steps[]) + walkthrough.md (human narrative) under .odoo-ai/packaging/<run>/<module>/,
      consumed by the provision-capture phase for scenario-driven per-step capture. Positive happy-path
      journeys only - not a QA oracle, NOT bound by acceptance-oracle-contract.md. Default
      bounds: MAX_SCENARIOS=5, MAX_STEPS_PER_SCENARIO=12; emit note if scenarios are trimmed
      to bound. Standalone-first; no browser or live instance required. Fan out one worker
      per doc:true module (Mode B); aggregate before gate.
    model_tier: sonnet
    fanout: true
    chunk_by: modules
    gate: "approve / refine: [feedback] / cancel"

  # ------------------------------------------------------------------
  # Phase 3 - Icon design (browser-free, fan-out per doc:true module - Mode B)
  # Independent of P1-P2; no browser or live instance required.
  # ------------------------------------------------------------------
  - id: icon
    skill: odoo-icon-design
    nl_trigger: >
      For each module with doc:true in .odoo-ai/packaging/<run>/doc-plan.yaml (skip doc:false
      dedup modules), using .odoo-ai/packaging/<run>/scope.yaml, design a brand-aware,
      version-correct module identity icon. Compose SVG with era-correct style (skeuo for v8-v10;
      flat solid for v11-v16; flat-shadow material for v17-v19); rasterize to icon.png 256x256 via
      the first detected rasterizer in order: rsvg-convert -> inkscape -> magick/convert
      (ImageMagick) -> cairosvg -> Pillow. If no rasterizer is found, write icon.svg only and emit a
      WARNING with copy-paste install instructions for Ubuntu (librsvg2-bin or imagemagick), macOS
      (brew install librsvg), and Python (pip install cairosvg); set status:
      NEEDS_CONTEXT(no SVG rasterizer; icon.svg written, icon.png pending). Write to
      <module>/static/description/icon.png; on v19 also write icon.svg and merge the manifest
      'icon' key (read-before-edit). Brand-agnostic: pull palette from .odoo-ai/context.md
      brand tokens or use Odoo default (#714B67). Fan out one worker per doc:true module (Mode B).
    model_tier: sonnet
    fanout: true
    chunk_by: modules
    gate: "approve / regenerate / cancel"

  # ------------------------------------------------------------------
  # Phase 4 - Marketing copy (browser-free, fan-out per doc:true module - Mode B)
  # Requires: feature-catalog.jsonl from P1.
  # ------------------------------------------------------------------
  - id: copy
    skill: odoo-content-draft
    nl_trigger: >
      For each module with doc:true in .odoo-ai/packaging/<run>/doc-plan.yaml (skip doc:false
      dedup modules), using .odoo-ai/packaging/<run>/scope.yaml, draft App-Store landing copy for
      every resolved language (English canonical mandatory; per-locale variants per languages[]
      from scope.yaml). Channel: landing-page copy. Output: sectioned copy with HTML-comment markers
      <!-- HERO --> / <!-- KEY-FEATURES --> / <!-- BENEFITS --> / <!-- SCREENSHOTS --> /
      <!-- TARGET-USERS --> / <!-- CTA --> and [Image: slug] placeholders for screenshots not
      yet captured. Ground Key-Features copy in the feature catalog at
      .odoo-ai/packaging/<run>/<module>/feature-catalog.jsonl. When the module's doc-plan entry has a
      non-empty extends_in_scope[], add a one-line "Extends <base> - see its documentation" pointer
      (D13.7 cross-reference hint). Emit status: NEEDS_NEXT -> odoo-doc-illustration to fill
      [Image:] markers with live screenshots. No browser or live instance required.
      Fan out one worker per doc:true module (Mode B); aggregate per-module per-locale copy artifacts
      before gate.
    model_tier: sonnet
    fanout: true
    chunk_by: modules
    gate: "approve / refine: [feedback] / cancel"

  # ------------------------------------------------------------------
  # Phase 5 - Provision + capture (delegated to skill odoo-doc-illustration)
  # The ONLY instance-touching + browser-bound phase. Delegates entirely to the
  # odoo-doc-illustration skill, which is the branch-aware per-instance incremental loop SSOT
  # (D14.2/D14.3): provision via odoo-instance, capture via the skill's two writers (one per
  # audience, SEQUENTIAL on the same instance handle), verify, commit via git-ops, advance
  # next-delta. The workflow does NOT restate the loop mechanics here.
  # Phase 4 pre-fetched per-module per-locale marketing copy; the skill does NOT re-fetch on
  # this workflow path (Phase 4 copy artifacts are forwarded directly to the skill).
  # SEQUENTIAL within a dependency-path; PARALLEL across independent instance-paths up to W.
  # Requires: P1 (feature-catalog.jsonl), P2 (walkthrough.jsonl), P4 (copy) for doc:true
  # modules, and P0.5 (doc-plan.yaml).
  # ------------------------------------------------------------------
  - id: provision-capture
    skill: odoo-doc-illustration
    nl_trigger: >
      Delegate to the odoo-doc-illustration skill, which owns the per-instance incremental
      provision-capture loop (see SKILL.md). Forward: doc-plan at
      .odoo-ai/packaging/<run>/doc-plan.yaml, scope at .odoo-ai/packaging/<run>/scope.yaml,
      and per-module Phase 1-4 artifacts under .odoo-ai/packaging/<run>/<module>/
      (feature-catalog.jsonl from Phase 1, walkthrough.jsonl from Phase 2, marketing copy
      per locale from Phase 4 - do NOT re-fetch; pass directly to the skill).
    model_tier: sonnet
    gate: "approve / refine: [feedback] / cancel"

  # ------------------------------------------------------------------
  # Phase 6 - Manifest audit (inline, per doc:true module)
  # Browser-free.
  # ------------------------------------------------------------------
  - id: manifest-audit
    inline: true
    model_tier: sonnet
    gate: "save / dismiss / cancel"
    # For each module with doc:true in .odoo-ai/packaging/<run>/doc-plan.yaml (skip doc:false
    # dedup modules - they are install-only deps, not documented), audit App-Store manifest keys:
    #   REQUIRED (blocking if missing): name, summary, description, images[0] (cover),
    #     license, category
    #   RECOMMENDED (warning if missing): support, website, maintainer, application
    #   OPTIONAL (info): live_test_url, price, currency, version
    # Suggest values for missing non-commercial fields. NEVER fabricate commercial keys
    # (price / live_test_url / currency - these are instance/commercial-specific and must
    # only be set by the module owner). Score each module: required-missing = blocking,
    # recommended-missing = warning, optional-missing = info. Write per-module results to
    # .odoo-ai/packaging/<run>/<module>/manifest-audit.md.

  # ------------------------------------------------------------------
  # Phase 7 - Aggregate index (inline)
  # Browser-free.
  # ------------------------------------------------------------------
  - id: aggregate-index
    inline: true
    model_tier: inherit
    gate: "save / cancel"
    # Collect all per-module output paths (icon.png, index.html, doc/index.rst, per-locale
    # variants, walkthrough.jsonl, walkthrough.md, feature-catalog.md, manifest-audit.md) for each
    # doc:true module from its .odoo-ai/packaging/<run>/<module>/ subdir and write a combined run
    # index at .odoo-ai/packaging/<run>/index.jsonl listing every artifact:
    # {module, locale, artifact_type, path, status: captured|degraded|placeholder}.
    # Emit a run summary to the user: modules packaged (doc:true), modules skipped as install-only
    # deps (doc:false + dedup_reason), instances allocated, locales covered, total artifacts,
    # any DONE_WITH_CONCERNS items (capture downgrades, W=1 serialization, missing rasterizer,
    # locale fallbacks, manifest-audit blocking gaps). Note: final HTML/RST artifacts are written
    # directly to the module tree (e.g. <module>/static/description/index.html); the
    # .odoo-ai/packaging/<run>/ directory holds only the run index, audit reports, catalog,
    # doc-plan.yaml, and scenario working files.
