# odoo-respond-bid.workflow.yaml
# Declarative SSOT for the /odoo-respond-bid command.
# Replaces the inline prose logic in commands/odoo-respond-bid.md.
# Runner: skills/workflow-chaining - auto-discovered at runtime.
name: odoo-respond-bid
domain: presales
team_pattern: Pipeline
description: |
  Generate a complete Odoo bid response package from raw prospect input. Chains
  discovery synthesis -> gap analysis -> capability proof -> objection pre-empt ->
  proposal draft. Trigger: "respond to RFP", "bid response", "proposal from prospect
  email", "post-discovery proposal", "turn my discovery notes into a proposal",
  "Odoo bid for customer", "answer RFP with Odoo capability proof"
output_dir: .odoo-ai/bids
inputs:
  - customer_label
  - prospect_input
  - close_date
  - deal_size
  - contact_role

resume: true
fallback: standalone

phases:
  # ------------------------------------------------------------------
  # Phase 0 - Parse arguments + context check (inline: runner handles)
  # ------------------------------------------------------------------
  - id: parse-and-context
    inline: true
    model_tier: inherit
    # Runner collects: customer_label (default "Customer-A"), prospect_input,
    # close_date, deal_size (S/M/L), contact_role.
    # Checks for .odoo-ai/context.md; warns + offers /odoo-onboarding if absent.
    # Hard rules enforced inline:
    #   - Abstract labels only (no real company/contact names in saved files)
    #   - No external writes before Gate 5

  # ------------------------------------------------------------------
  # Phase 1 - Discovery synthesis
  # ------------------------------------------------------------------
  - id: discovery-synthesis
    skill: odoo-discovery-summary
    nl_trigger: >
      Summarize the customer profile from the following raw prospect input. Identify:
      industry, size, key pain points (max 5), success criteria (max 3), relevant Odoo
      modules, and deployment risk (low/medium/high with one-line reason). Use the
      abstract customer label throughout - never log real company or contact names.
      Input: {prospect_input}
    model_tier: sonnet
    gate: "yes / edit / cancel"

  # ------------------------------------------------------------------
  # Phase 2 - Gap analysis
  # ------------------------------------------------------------------
  - id: gap-analysis
    skill: odoo-gap-analysis
    nl_trigger: >
      Analyze the gap between the customer's requirements and standard Odoo capabilities
      using the profile from the discovery-synthesis phase. Classify each pain point and
      success criterion (Standard / Config / Extension / Custom) and estimate effort
      (S / M / L / XL) per the skill's own classification and effort-tier band definitions.
      Flag Custom items as "to be quoted separately". Write the locked artifact set and
      report the run directory path so downstream phases can read it by file path.
    model_tier: sonnet
    gate: "yes / edit / cancel"
    # Artifact output (locked file-handoff contract; written by odoo-gap-analysis, READ by
    # capability-proof + objection-preempt + assemble-proposal instead of re-deriving from chat):
    #   .odoo-ai/gap-analysis/<slug>-<date>/gap-matrix.jsonl  - one JSON object per requirement
    #     {req_id, requirement, coverage, classification, effort_tier, module, grounded, notes}
    #   .odoo-ai/gap-analysis/<slug>-<date>/gap-report.md     - human matrix + effort totals
    #   .odoo-ai/gap-analysis/<slug>-<date>/gap-continuation-contract.json - meta.effort_days{min,max}
    # Downstream phases resolve the path via the run dir reported here, or by globbing the
    # newest match: .odoo-ai/gap-analysis/*/gap-matrix.jsonl

  # ------------------------------------------------------------------
  # Phase 3 - Capability proof
  # ------------------------------------------------------------------
  - id: capability-proof
    skill: odoo-capability-proof
    nl_trigger: >
      Read the gap matrix produced by the gap-analysis phase from its
      .odoo-ai/gap-analysis/<slug>-<date>/gap-matrix.jsonl artifact (the run dir reported by
      that phase, or the newest .odoo-ai/gap-analysis/*/gap-matrix.jsonl) and cite the path.
      For each row whose classification is Standard or Config, provide concrete Odoo
      capability evidence: module name, relevant model/field, and concrete demo steps (max 3
      per item). Batch all Standard/Config items in one consolidated proof list. For
      Extension rows, note that code evidence is available on request. Custom rows: list them
      with the note "to be quoted separately in commercial proposal". Odoo version: use
      .odoo-ai/context.md if available, else ask.
    model_tier: sonnet
    gate: "yes / iterate / cancel"

  # ------------------------------------------------------------------
  # Phase 4 - Objection pre-empt
  # ------------------------------------------------------------------
  - id: objection-preempt
    skill: odoo-objection-handling
    nl_trigger: >
      Based on the raw prospect input and the gap matrix at
      .odoo-ai/gap-analysis/<slug>-<date>/gap-matrix.jsonl (the run dir reported by the
      gap-analysis phase, or the newest .odoo-ai/gap-analysis/*/gap-matrix.jsonl; cite the
      path), anticipate 2-3 likely objections from the prospect. For each objection:
      acknowledge the concern, provide concrete Odoo evidence, propose a de-risk next step.
      Tone calibrated to: {contact_role}. Common archetypes to consider: missing enterprise
      feature, data residency/compliance, TCO vs current solution, data migration risk, local
      support availability.
    model_tier: sonnet
    gate: "yes / edit / cancel"

  # ------------------------------------------------------------------
  # Phase 5 - Assemble proposal draft (inline assembly)
  # ------------------------------------------------------------------
  - id: assemble-proposal
    inline: true
    model_tier: sonnet
    # Runner assembles full proposal from all prior phase outputs.
    # Structure:
    #   1. Cover letter (1 paragraph, addressed to contact_role)
    #   2. Executive summary (pain points + proposed solution)
    #   3. Gap matrix table - read from the gap-analysis run dir gap-report.md
    #      (.odoo-ai/gap-analysis/<slug>-<date>/gap-report.md), not from chat
    #   4. Capability evidence list (Phase 3 output, grouped by module)
    #   5. Anticipated objection responses (Phase 4 playbook, inline)
    #   6. Roadmap and cost tier (S/M/L effort_tier from gap-matrix.jsonl; NO currency figures)
    #   7. Next steps (CTA: book demo / technical workshop / commercial proposal)
    # Extension/Custom items: "Custom development items will be quoted separately
    # after technical scope confirmation."
    # Confirms close_date and cost tier are consistent with Phase 0 inputs.
    gate: "yes - save file + export / iterate / cancel"

  # ------------------------------------------------------------------
  # Phase 6 - Output (inline write)
  # ------------------------------------------------------------------
  - id: output
    inline: true
    model_tier: inherit
    # On Gate 5 confirm:
    #   1. Write .odoo-ai/bids/<customer_label>-<YYYY-MM-DD>.md (create dir if needed)
    #   2. Print full proposal to terminal for copy-paste
    #   3. Show summary: "Bid response saved: .odoo-ai/bids/<file>"
    #   4. Remind: .odoo-ai/ should be in .gitignore
    # Note: runner does NOT send emails.
